# ------------------------------------------ RETRIEVAL RELEVANCY ------------------------------------------ #
rr_prompt_template: |
  You are an expert scoring RETRIEVED CONTENT's relevancy based on USER QUERY. 
    Your task is to assign a relevancy score based on the requirements below:

    ###INSTRUCTIONS###
            - Read and understand the full meaning of USER QUERY
            - RUBRICS:
                - Only generate the score as 1 or 2 or 3
                - Scoring as 1: if the RETRIEVED CONTENT has nothing to do with the USER QUERY
                - Scoring as 2: if the RETRIEVED CONTENT seems relevant to USER QUERY but doesn't answer the USER QUERY
                - Scoring as 3: if the RETRIEVED CONTENT is relevant to USER QUERY and can directly answer the USER QUERY
            - Provide detailed scoring reasons

    ###EXAMPLE OUTPUT FORMAT###
            {{
                "score": 1,
                "reasoning": The RETRIEVED CONTENT is not relevant to the USER QUERY at all
            }}
            {{
                "score": 2,
                "reasoning": the RETRIEVED CONTENT seems relevant to USER QUERY but doesn't contain the answer of the USER QUERY
            }}
            {{
                "score": 3,
                "reasoning": the RETRIEVED CONTENT can directly address the USER QUERY
            }}

    Here is the USER QUERY:
    {user_query}

    Here is the RETRIEVED CONTENT:
    {retrieved_content}

    Your evaluation should follow this format:
    {format_instructions}
# ------------------------------------------ RETRIEVAL RELEVANCY ------------------------------------------ #


# ------------------------------------------ ANSWER ACCURACY ------------------------------------------ #
ac_prompt_template: |
    You are an impartial judge tasked with evaluating the quality and usefulness of AI's ANSWER.
    Your evaluation should consider the following key criteria:
        - Relevance: How well does it address the USER QUERY?
        - Accuracy: Is it correct comparing with the REFERENCED ANSWER?

    ###EVALUATION PROCESS###
    1. **ANALYZE** the USER QUERY and the AI's ANSWER carefully
    2. **EVALUATE** how well the response meets each of the criteria above
    3. **CONSIDER** the overall usefulness of AI's ANSWER
    4. **PROVIDE** a clear, objective explanation for your evaluation
    5. **SCORE** AI's ANSWER on a scale from 0 to 3:
        - 0: AI's ANSWER is completely irrelevant to the USER QUERY
        - 1: AI's ANSWER is relevant to the USER QUERY but comparing with the REFERENCED ANSWER, it's inaccurate
        - 2: AI's ANSWER is relevant to the USER QUERY and partially accurate comparing with the REFERENCED ANSWER
        - 3: AI's ANSWER is relevant to the USER QUERY and fully accurate comparing with the REFERENCED ANSWER
    6. **REASONS** Provide detailed reasons for your score

    ###EXAMPLE OUTPUT FORMAT###
            {{
                "score": 3,
                "reasoning": "AI's ANSWER is not only relevant to the USER QUERY, but also contains all critical info mentioned in the REFERENCED ANSWER"
            }}
            {{
                "score": 2,
                "reasoning": "AI's ANSWER is relevant to the USER QUERY, while it contains some critial info mentioned in the REFERENCED ANSWER, it's missing other critical info"
            }}
            {{
                "score": 1,
                "reasoning": "AI's ANSWER seems relevant to the USER QUERY, but comparing with the REFERENCED ANSWER, it's completely inaccurate"
            }}
            {{
                "score": 0,
                "reasoning": "AI's ANSWER is completely irrelevant to the USER QUERY"
            }}

    ###OUTPUT Requirements###
    - Make sure your output reasoning is brief but comprehensive, covering all key points that justify your score
    - Try to make output reasoning with no more than 60 tokens if you can

    Here is the USER QUERY:
    {user_query}

    Here is the AI's ANSWER:
    {ai_answer}

    Here is the REFERENCED ANSWER:
    {referenced_answer}

    Your evaluation should follow this format:
    {format_instructions}
# ------------------------------------------ ANSWER ACCURACY ------------------------------------------ #