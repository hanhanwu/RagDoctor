llm_models: ['llama-3.1-8b-instant']
embedding_models: ['BAAI/bge-small-en-v1.5']
retriever_settings:
  - name: mx
    retriever_params:
      top_k: 1
      alpha: 0.6
indexing_storage_dirs: ['./storage_mx']
output_files: ['./output/mx.json']
eval_rq_output: ['./output/eval_results/mx_rq.xlsx']
eval_aq_output: ['./output/eval_results/mx_aq.xlsx']
eval_all_output: ['./output/eval_results/mx_all.xlsx']